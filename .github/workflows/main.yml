name: Sync HomeNet Inventory

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:     

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch CSV from FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: skipster-inventory.site
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ./
          dangerous-clean-slate: false

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Inventory Bot'
          git config --global user.email 'bot@skipster.ai'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update inventory from HomeNet" && git push)
